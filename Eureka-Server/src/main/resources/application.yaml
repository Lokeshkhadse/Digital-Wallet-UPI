  server:
    port: 8761

  spring:
    application:
      name: EUREKA-SERVER

  eureka:
    client:
      register-with-eureka: false
      fetch-registry: false

    server:
      enable-self-preservation: true
      eviction-interval-timer-in-ms: 60000

  management:
    endpoints:
      web:
        exposure:
          include: "*"

    endpoint:
      health:
        show-details: always

