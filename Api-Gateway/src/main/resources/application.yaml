
  server:
    port: 8080

  spring:
    application:
      name: API-GATEWAY

    cloud:
      gateway:
        routes:

          - id: auth-service
            uri: lb://AUTH-SERVICE
            predicates:
              - Path=/auth/**

          - id: action-service
            uri: lb://ACTION-SERVICE
            predicates:
              - Path=/action/**

          - id: query-service
            uri: lb://QUERY-SERVICE
            predicates:
              - Path=/query/**

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/

  jwt:
    secret: mySuperSecretKeyMySuperSecretKey
    expiration: 900000

  management:
    endpoints:
      web:
        exposure:
          include: "*"

