
  server:
    port: 8085

  spring:
    application:
      name: API-GATEWAY

    cloud:
      gateway:
        routes:

          - id: auth-service
#            uri: lb://AUTH-SERVICE   // this lb use when you are usign any discover registry
            uri: http://localhost:8081
            predicates:
              - Path=/auth/**

          - id: action-service
            uri: http://localhost:8082
            predicates:
              - Path=/action/**

          - id: query-service
            uri: http://localhost:8084
            predicates:
              - Path=/query/**

          - id: ledger-service
            uri: http://localhost:8083
            predicates:
              - Path=/ledger/**

          - id: notification-service
            uri: http://localhost:8086
            predicates:
              - Path=/notification/**

          - id: kyc-service
            uri: http://localhost:8087
            predicates:
              - Path=/kyc/**

#  Eureka
#  eureka:
#    client:
#      service-url:
#        defaultZone: http://localhost:8761/eureka/
#    instance:
#      prefer-ip-address: true

  jwt:
    secret: mysecretkeymysecretkeymysecretkey123456
    expiration: 86400000

  management:
    endpoints:
      web:
        exposure:
          include: "*"



