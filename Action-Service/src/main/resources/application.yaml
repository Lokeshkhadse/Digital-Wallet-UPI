#        enabled: true   # ✅ IMPORTANT for Feign fallback

# ------------------------
# EUREKA CONFIG
# ------------------------
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

