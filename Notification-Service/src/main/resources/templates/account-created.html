<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Account Created</title>

    <!-- CSS HERE -->
    <style>
        body{
        font-family:Arial,sans-serif;
        background:#f4f6f9;
        margin:0;
        padding:20px;
        }

        .container{
        max-width:700px;
        margin:auto;
        background:#fff;
        border-radius:10px;
        overflow:hidden;
        box-shadow:0 2px 8px rgba(0,0,0,.1);
        }

        .header{
        background:#003366;
        color:#fff;
        padding:20px;
        text-align:center;
        }

        .content{
        padding:30px;
        }

        table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
        }

        td{
        padding:12px;
        border:1px solid #ddd;
        }

        .label{
        background:#f7f7f7;
        font-weight:bold;
        width:40%;
        }

        .success{
        color:green;
        font-size:22px;
        font-weight:bold;
        }

        .amount{
        font-size:26px;
        font-weight:bold;
        color:#006400;
        }

        .footer{
        background:#f7f7f7;
        padding:20px;
        font-size:12px;
        color:#666;
        text-align:center;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="header">
        <h2>Digital Wallet Bank</h2>
    </div>

    <div class="content">

        <p>Dear <b th:text="${name}"></b>,</p>

        <p class="success">
            Your Account Has Been Successfully Created
        </p>

        <table>

            <tr>
                <td class="label">Account Number</td>
                <td th:text="${accountNumber}"></td>
            </tr>

            <tr>
                <td class="label">Bank Name</td>
                <td th:text="${bankName}"></td>
            </tr>

            <tr>
                <td class="label">UPI ID</td>
                <td th:text="${upiId}"></td>
            </tr>

        </table>

        <br>

        <p>
            Welcome to Digital Wallet Banking Services.
            Your account is now active and ready to use.
        </p>

    </div>

    <div class="footer">

        This is an automated email.
        Please do not reply.

    </div>

</div>

</body>
</html>
