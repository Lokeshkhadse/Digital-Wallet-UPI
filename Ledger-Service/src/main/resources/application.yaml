spring:
  application:
    name: LEDGER-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/digital_wallet
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083

springdoc:
  api-docs:
    # जब Gateway /ledger/v3/api-docs हिट करेगा, तो JSON में सारे paths /ledger/.. से शुरू होंगे
    path: /v3/api-docs

